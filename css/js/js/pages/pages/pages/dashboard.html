<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Shifa Multi Services</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>📊 Menu</h3>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item active">📊 Dashboard</a>
                <a href="customers.html" class="nav-item">👥 Customers</a>
                <a href="billing.html" class="nav-item">📄 Bills</a>
                <a href="payments.html" class="nav-item">💳 Payments</a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-danger btn-full" onclick="logout()">🚪 Logout</button>
            </div>
        </aside>

        <main class="dashboard-content">
            <header class="dashboard-header">
                <div>
                    <h1>Welcome, <span id="ownerName"></span>! 👋</h1>
                    <p id="businessName" class="text-muted"></p>
                </div>
            </header>

            <div class="stats-grid">
                <div class="stat-card">
                    <div>
                        <div class="stat-icon">👥</div>
                        <div class="stat-content">
                            <h3>Total Customers</h3>
                            <p class="stat-number" id="totalCustomers">0</p>
                        </div>
                    </div>
                </div>
                <div class="stat-card">
                    <div>
                        <div class="stat-icon">💰</div>
                        <div class="stat-content">
                            <h3>Total Revenue</h3>
                            <p class="stat-number" id="totalRevenue">₹0</p>
                        </div>
                    </div>
                </div>
                <div class="stat-card">
                    <div>
                        <div class="stat-icon">⏳</div>
                        <div class="stat-content">
                            <h3>Pending Bills</h3>
                            <p class="stat-number" id="pendingBills">0</p>
                        </div>
                    </div>
                </div>
                <div class="stat-card">
                    <div>
                        <div class="stat-icon">💸</div>
                        <div class="stat-content">
                            <h3>Pending Amount</h3>
                            <p class="stat-number" id="pendingAmount">₹0</p>
                        </div>
                    </div>
                </div>
            </div>

            <section class="recent-section">
                <h2>📋 Recent Bills</h2>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Bill #</th>
                            <th>Customer</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="recentBillsTable">
                        <tr><td colspan="5" class="text-center">Loading...</td></tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="../js/database.js"></script>
    <script src="../js/app.js"></script>
    <script>
        checkAuth();
        const owner = Auth.getCurrentOwner();

        function loadDashboard() {
            document.getElementById('ownerName').textContent = owner.ownerName;
            document.getElementById('businessName').textContent = owner.businessName;
            const stats = db.getDashboardStats(owner.id);
            document.getElementById('totalCustomers').textContent = stats.totalCustomers;
            document.getElementById('totalRevenue').textContent = formatCurrency(stats.totalRevenue);
            document.getElementById('pendingBills').textContent = stats.pendingBills;
            document.getElementById('pendingAmount').textContent = formatCurrency(stats.pendingAmount);
            loadRecentBills(stats.recentBills);
        }

        function loadRecentBills(bills) {
            const tbody = document.getElementById('recentBillsTable');
            tbody.innerHTML = '';
            if (bills.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center">No bills yet</td></tr>';
                return;
            }
            bills.forEach(bill => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${bill.billNumber}</strong></td>
                    <td>${bill.customerName}</td>
                    <td>${formatCurrency(bill.amount)}</td>
                    <td><span class="badge badge-${bill.status}">${bill.status.toUpperCase()}</span></td>
                    <td>${formatDate(bill.createdAt)}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function logout() {
            Auth.logout();
        }

        loadDashboard();
    </script>
</body>
</html>
