<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bills - Shifa Multi Services</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header"><h3>📊 Menu</h3></div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
                <a href="customers.html" class="nav-item">👥 Customers</a>
                <a href="billing.html" class="nav-item active">📄 Bills</a>
                <a href="payments.html" class="nav-item">💳 Payments</a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-danger btn-full" onclick="logout()">🚪 Logout</button>
            </div>
        </aside>

        <main class="dashboard-content">
            <header class="dashboard-header">
                <h1>📄 Bills</h1>
                <button class="btn btn-secondary" onclick="toggleModal('createBillModal')">➕ Create</button>
            </header>

            <div class="filter-section">
                <select id="statusFilter" onchange="loadBills()">
                    <option value="">All Bills</option>
                    <option value="pending">Pending</option>
                    <option value="partial">Partial</option>
                    <option value="paid">Paid</option>
                </select>
            </div>

            <div id="createBillModal" class="modal" style="display:none;">
                <div class="modal-content">
                    <span class="close">&times;</span>
                    <h2>➕ Create Bill</h2>
                    <form id="billForm" class="auth-form">
                        <div class="form-group">
                            <label>Customer *</label>
                            <select id="customerId" required></select>
                        </div>
                        <div class="form-group">
                            <label>Description *</label>
                            <textarea id="description" required rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Amount (₹) *</label>
                            <input type="number" id="amount" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label>Due Date</label>
                            <input type="date" id="dueDate">
                        </div>
                        <button type="submit" class="btn btn-primary btn-full">✅ Create</button>
                    </form>
                </div>
            </div>

            <table class="data-table">
                <thead>
                    <tr>
                        <th>Bill #</th>
                        <th>Customer</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Due Date</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="billsTable">
                    <tr><td colspan="7" class="text-center">Loading...</td></tr>
                </tbody>
            </table>
        </main>
    </div>

    <script src="../js/database.js"></script>
    <script src="../js/app.js"></script>
    <script>
        checkAuth();
        const owner = Auth.getCurrentOwner();

        function loadBills() {
            const status = document.getElementById('statusFilter').value;
            const bills = db.getBills(owner.id, status || null);
            const tbody = document.getElementById('billsTable');
            tbody.innerHTML = '';
            if (!bills.length) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center">No bills</td></tr>';
                return;
            }
            bills.forEach(b => {
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${b.billNumber}</strong></td>
                        <td>${b.customerName}</td>
                        <td>${formatCurrency(b.amount)}</td>
                        <td><span class="badge badge-${b.status}">${b.status.toUpperCase()}</span></td>
                        <td>${b.dueDate ? formatDate(b.dueDate) : '-'}</td>
                        <td>${formatDate(b.createdAt)}</td>
                        <td>
                            <button class="btn btn-small" onclick="deleteBill(${b.id})">Delete</button>
                        </td>
                    </tr>
                `;
            });
        }

        function loadCustomers() {
            const customers = db.getCustomers(owner.id);
            const select = document.getElementById('customerId');
            select.innerHTML = '<option value="">-- Select --</option>';
            customers.forEach(c => {
                select.innerHTML += `<option value="${c.id}">${c.name}</option>`;
            });
        }

        document.getElementById('billForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const result = db.createBill(owner.id, {
                customerId: parseInt(document.getElementById('customerId').value),
                description: document.getElementById('description').value,
                amount: parseFloat(document.getElementById('amount').value),
                dueDate: document.getElementById('dueDate').value || null
            });
            if (result.success) {
                showAlert('success', '✅ Bill created!');
                document.getElementById('billForm').reset();
                toggleModal('createBillModal');
                loadBills();
            }
        });

        function deleteBill(id) {
            if (confirm('Delete this bill?')) {
                db.deleteBill(id, owner.id);
                showAlert('success', '✅ Deleted!');
                loadBills();
            }
        }

        function logout() { Auth.logout(); }
        
        loadBills();
        loadCustomers();
    </script>
</body>
</html>
